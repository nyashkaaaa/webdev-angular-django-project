<nav class="navbar">
  <div class="logo-wrapper" routerLink="/anime">
    <img 
      src="https://img.icons8.com/?size=160&id=DmaIlTlcjYLw&format=png" 
      class="logo-icon" 
      alt="Applevein Logo"
      (click)="openEasterEgg($event)"
    >
    <h1 class="logo-text">Applevein</h1>
  </div>

  <div class="nav-links">
    <div class="dropdown-wrapper">
      <a class="nav-item" (click)="toggleDropdown($event)">Categories</a>
      
      <div class="dropdown-menu" *ngIf="isDropdownOpen">
        <div class="dropdown-header">Genre</div>
        <div class="genres-grid" *ngIf="genres.length > 0">
          <a
            class="genre-item"
            *ngFor="let g of genres"
            (click)="selectGenre(g.name)"
           >{{ g.name }}</a>
        </div>
        <div class="genres-loading" *ngIf="genres.length === 0">
          Loading genres...
        </div>
      </div>
    </div>

    <a routerLink="/popular" class="nav-item">Popular</a>
    <a routerLink="/my-list" class="nav-item">My List</a>

    <div class="nav-right-actions">
      <button class="search-icon-btn" (click)="showSearch = true" title="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <div class="profile-wrapper">
        <button class="profile-icon-btn" (click)="toggleProfileMenu($event)" title="Profile">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </button>

        <!-- Не залогинен -->
        <div class="profile-dropdown-menu" *ngIf="isProfileMenuOpen && !isLoggedIn()">
          <div class="profile-dropdown-item" routerLink="/register" (click)="closeAllMenus()">
            <div class="p-item-title">Создать аккаунт</div>
            <div class="p-item-desc">Попробуйте бесплатно или оформите Премиум.</div>
          </div>
          <div class="profile-dropdown-item" routerLink="/login" (click)="closeAllMenus()">
            <div class="p-item-title">Войти</div>
            <div class="p-item-desc">Уже присоединились к Applevein? С возвращением.</div>
          </div>
        </div>

        <!-- Залогинен -->
        <div class="profile-dropdown-menu" *ngIf="isProfileMenuOpen && isLoggedIn()">
          <div class="profile-dropdown-item" routerLink="/profile" (click)="closeAllMenus()">
            <div class="p-item-title">Мой профиль</div>
            <div class="p-item-desc">Список аниме, отзывы, достижения</div>
          </div>
          <div class="profile-dropdown-item" routerLink="/my-list" (click)="closeAllMenus()">
            <div class="p-item-title">Мой список</div>
            <div class="p-item-desc">Управляй своим списком аниме</div>
          </div>
          <div class="profile-dropdown-item" (click)="logout(); closeAllMenus()">
            <div class="p-item-title" style="color: #ff4444;">Выйти</div>
            <div class="p-item-desc">Выйти из аккаунта</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</nav>

<div class="site-overlay" *ngIf="isDropdownOpen || isProfileMenuOpen" (click)="closeAllMenus()"></div>

<div class="video-overlay" *ngIf="showVideo" (click)="closeVideo()">
  <div class="video-container" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeVideo()">×</button>
    <iframe [src]="videoUrl" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<app-search-overlay *ngIf="showSearch" (close)="showSearch = false" />

<main class="container">
  <router-outlet></router-outlet>
</main>

<app-ai-chat />
