<div class="chat-widget">

  <!-- Кнопка открытия -->
  <button class="chat-toggle-btn" (click)="toggleChat()" [class.open]="isOpen" title="AniBot AI">
    <svg *ngIf="!isOpen" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
      <circle cx="8" cy="11" r="1.5" fill="#f47521"/>
      <circle cx="12" cy="11" r="1.5" fill="#f47521"/>
      <circle cx="16" cy="11" r="1.5" fill="#f47521"/>
    </svg>
    <svg *ngIf="isOpen" width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Панель чата -->
  <div class="chat-panel" *ngIf="isOpen">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="bot-avatar">
          <img src="https://preview.redd.it/17z90wzn7r911.jpg?auto=webp&s=2d5940f51327479b66ab4bede3ebd8e35d7bd36f" alt="Bot Avatar">
        </div>
        <div>
          <div class="bot-name">AniBot AI</div>
          <div class="bot-status">Онлайн</div>
        </div>
      </div>
    </div>

    <div class="chat-messages">
      <div
        *ngFor="let msg of messages"
        class="message"
        [class.bot]="msg.role === 'bot'"
        [class.user]="msg.role === 'user'"
      >
        <div class="message-bubble" [style.white-space]="'pre-line'">{{ msg.text }}</div>
      </div>

      <div class="message bot" *ngIf="isTyping">
        <div class="message-bubble typing">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div #messagesEnd></div>
    </div>

    <div class="chat-input-area">
      <input
        class="chat-input"
        [(ngModel)]="input"
        (keydown)="onKeydown($event)"
        placeholder="Спроси меня о чём-нибудь..."
        autocomplete="off"
      />
      <button class="send-btn" (click)="send()" [disabled]="!input.trim()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>
