<div class="search-overlay" (click)="onOverlayClick($event)">

  <div class="search-top">
    <div class="search-bar-wrapper">
      <input
        class="search-input"
        [(ngModel)]="query"
        (input)="onInput()"
        placeholder="Search..."
        autofocus
      >
      <button class="search-close" (click)="close.emit()">✕</button>
    </div>
  </div>

  <div class="search-body">

    <div class="spinner" *ngIf="loading"></div>

    <ng-container *ngIf="!loading && query.trim()">
      <div class="results-label" *ngIf="results.length > 0">Top results</div>

      <div class="results-grid" *ngIf="results.length > 0">
        <div
          class="anime-card"
          *ngFor="let anime of results"
          [routerLink]="['/anime', anime.id]"
          (click)="close.emit()"
        >
          <div class="card-image-wrap">
            <img class="main-poster" [src]="anime.image_url" [alt]="anime.title">

            <div class="info-overlay">
              <div class="overlay-content">
                <div class="meta-row">
                  <span class="rating">★ {{ anime.rating || 'N/A' }}</span>
                  <span class="stats">{{ anime.episodes }} ep</span>
                </div>

                <div class="description">{{ anime.description }}</div>

                <div class="action-icons">
                  <button class="icon-btn" title="Закладки"
                    (click)="openStatusModal(anime, $event)">🔖</button>
                  <button class="icon-btn" title="Добавить"
                    (click)="openStatusModal(anime, $event)">＋</button>
                </div>
              </div>
            </div>
          </div>

          <p class="anime-name">{{ anime.title }}</p>
        </div>
      </div>

      <div class="no-results" *ngIf="results.length === 0">
        Nothing found
      </div>
    </ng-container>

  </div>
</div>

<!-- Модал статуса -->
@if (selectedAnime) {
  <div class="status-overlay" (click)="closeModal($event)">
    <div class="status-modal">
      <div class="modal-anime-info">
        <img [src]="selectedAnime.image_url" class="modal-poster">
        <div>
          <p class="modal-title">{{ selectedAnime.title }}</p>
          <p class="modal-episodes">{{ selectedAnime.episodes }} episodes</p>
        </div>
      </div>

      <div class="status-options">
        @for (s of statuses; track s.value) {
          <button
            class="status-option"
            [class.active]="currentStatus === s.value"
            (click)="selectStatus(s.value)"
          >
            <span class="status-dot" [class]="'dot-' + s.value"></span>
            {{ s.label }}
          </button>
        }
      </div>

      <div class="modal-footer">
        @if (selectedAnime.userStatus) {
          <button class="btn-remove" (click)="removeFromList()">Remove from list</button>
        }
        <button class="btn-save" (click)="saveStatus()">Save</button>
      </div>
    </div>
  </div>
}
