<div class="settings-page">
  <div class="settings-container">

    <div class="settings-header">
      <h2 class="settings-title">Profile settings</h2>
      <button class="back-btn" routerLink="/profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="settings-body">

      <div class="section-row">
        <div class="section-block">
          <div class="section-label">Avatar</div>
          <label class="upload-zone" [class.has-preview]="form.avatarPreview">
            <img *ngIf="form.avatarPreview" [src]="form.avatarPreview" class="preview-img">
            <div *ngIf="!form.avatarPreview" class="upload-placeholder">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
                <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
              </svg>
              <span>Click or drag an image</span>
            </div>
            <input type="file" accept="image/*" (change)="onAvatarChange($event)" hidden>
          </label>
        </div>

        <div class="section-block">
          <div class="section-label">Avatar frame</div>
          <div class="frame-zone">
            <div class="frame-option selected">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
              </svg>
              <span>Выбрать рамку</span>
            </div>
            <div class="avatar-preview-box" *ngIf="form.avatarPreview">
              <img [src]="form.avatarPreview" class="frame-preview-img">
            </div>
          </div>
        </div>
      </div>

      <div class="section-block full">
        <div class="section-label">Фон профиля</div>
        <div class="tab-row">
          <button class="tab-pill" [class.active]="backgroundTab === 'static'" (click)="backgroundTab = 'static'">Обычный</button>
          <button class="tab-pill" [class.active]="backgroundTab === 'animated'" (click)="backgroundTab = 'animated'">Анимированный</button>
        </div>
        <label class="upload-zone small" [class.has-preview]="form.backgroundPreview">
          <img *ngIf="form.backgroundPreview" [src]="form.backgroundPreview" class="preview-img">
          <div *ngIf="!form.backgroundPreview" class="upload-placeholder">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
              <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            <span>Нажмите или перетащите изображение</span>
          </div>
          <input type="file" accept="image/*" (change)="onBackgroundChange($event)" hidden>
        </label>
      </div>

      <div class="section-block full">
        <div class="section-label">Информация</div>

        <div class="form-field">
          <label class="field-label">Никнейм</label>
          <input class="field-input" [(ngModel)]="form.username" placeholder="Ваш никнейм">
        </div>

        <div class="form-field">
          <label class="field-label">Пол</label>
          <select class="field-input field-select" [(ngModel)]="form.gender">
            <option value="">Не указан</option>
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
            <option value="other">Другой</option>
          </select>
        </div>

        <div class="form-field">
          <label class="field-label">О себе</label>
          <textarea class="field-input field-textarea" [(ngModel)]="form.bio" placeholder="Расскажите о себе..." rows="4"></textarea>
        </div>
      </div>

    </div>

    <div class="settings-footer">
      <button class="btn-cancel" routerLink="/profile">Отмена</button>
      <button class="btn-save" (click)="onSave()">Сохранить изменения</button>
    </div>

  </div>
</div>
