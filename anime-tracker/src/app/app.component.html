<nav class="navbar">
  <div class="logo-wrapper">
    <img
      src="https://img.icons8.com/?size=160&id=DmaIlTlcjYLw&format=png"
      class="logo-icon"
      alt="Applevein Logo"
      (click)="openEasterEgg($event)"
      style="z-index: 3000; position: relative;"
    >
    <h1 class="logo-text" routerLink="/anime">Applevein</h1>
  </div>

  <div class="nav-links">
    <div class="dropdown-wrapper">
      <a class="nav-item" (click)="toggleDropdown($event)">Категории</a>

      <div class="dropdown-menu" *ngIf="isDropdownOpen">
        <div class="dropdown-header">Жанры</div>
        <div class="genres-grid">
          <a
            class="genre-item"
            *ngFor="let genre of genres"
            (click)="filterByGenre(genre)"
          >{{ genre.name }}</a>
        </div>
      </div>
    </div>

    <a routerLink="/popular" class="nav-item">Популярное</a>
    <a routerLink="/my-list" class="nav-item">Мой список</a>
    <a routerLink="/login" class="nav-item">Войти</a>
    <a routerLink="/register" class="signup-btn">Присоединиться</a>

    <button class="search-icon-btn" (click)="showSearch = true" title="Поиск">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>

    <a routerLink="/profile" class="profile-icon-btn" title="Профиль">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </a>
  </div>
</nav>

<div class="video-overlay" *ngIf="showVideo" (click)="closeVideo()">
  <div class="video-container" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeVideo()">×</button>
    <iframe
      [src]="videoUrl"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

<div class="site-overlay" *ngIf="isDropdownOpen" (click)="closeDropdown()"></div>

<app-search-overlay *ngIf="showSearch" (close)="showSearch = false" />

<main class="container">
  <router-outlet></router-outlet>
</main>

<app-chat-bot></app-chat-bot>
