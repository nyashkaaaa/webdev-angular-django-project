<div class="login-split-container">
  
  <div class="login-image-side">
    <img src="https://pngimg.com/uploads/anime_girl/anime_girl_PNG27.png" class="login-side-img" alt="Background">
    <div class="img-overlay">
      <div class="image-text-content">
        <p>Ваши любимые истории ждут продолжения. Войдите, чтобы ничего не пропустить.</p>
      </div>
    </div>
  </div>

  <div class="login-form-side">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back!</h2>
        <p>Log in to your AniList account</p>
      </div>

      <form class="login-form" (ngSubmit)="login()">
        <div class="input-group">
          <label>Username / Email</label>
          <input 
            type="text" 
            name="username" 
            [(ngModel)]="username" 
            placeholder="Enter your username" 
            required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input 
            type="password" 
            name="password" 
            [(ngModel)]="password" 
            placeholder="••••••••" 
            required>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember"> <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading">
          {{ isLoading ? 'Checking...' : 'Login' }}
        </button>
      </form>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <div class="social-login">
          <div id="googleBtn" class="google-wrapper"></div>
      </div>

      <div class="login-footer">
        <span>Don't have an account? </span>
        <a [routerLink]="['/register']">Sign Up</a>
      </div>
    </div>
  </div>

</div>
