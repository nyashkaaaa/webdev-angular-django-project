<div class="chat-container" [class.open]="isOpen">
  <button class="chat-toggle" (click)="toggleChat()">
    <span *ngIf="!isOpen">💬</span>
    <span *ngIf="isOpen">✕</span>
  </button>

  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <span class="bot-avatar">🤖</span> AniBot AI
    </div>
    <div class="chat-messages">
      <div
        *ngFor="let msg of messages"
        [ngClass]="{'user-msg': msg.isUser, 'bot-msg': !msg.isUser}"
      >
        {{ msg.text }}
      </div>
      <div class="bot-msg typing" *ngIf="isLoading">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="chat-input">
      <input
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        placeholder="Спроси меня о чём-то..."
        [disabled]="isLoading"
      >
      <button (click)="sendMessage()" [disabled]="isLoading">➤</button>
    </div>
  </div>
</div>
